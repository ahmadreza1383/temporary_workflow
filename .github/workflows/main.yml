name: Build ComfyUI ROCm Docker Image and Release

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y zstd coreutils

      # 1) Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -t comfyui-rocm:latest .

      # Optional but recommended: verify ROCm/HIP torch inside image
      - name: Verify ROCm Torch inside image
        run: |
          docker run --rm comfyui-rocm:latest python3 - <<'PY'
          import sys
          import torch

          print("========== TORCH CHECK ==========")
          print("Torch version      :", torch.__version__)
          print("Torch location     :", torch.__file__)
          print("torch.version.hip  :", torch.version.hip)
          print("torch.version.cuda :", torch.version.cuda)
          print("=================================")

          if torch.version.hip is None:
              print("ERROR: torch is not ROCm/HIP build", file=sys.stderr)
              sys.exit(1)

          if torch.version.cuda is not None:
              print("ERROR: CUDA torch detected", file=sys.stderr)
              sys.exit(1)

          print("PASS: ROCm/HIP torch confirmed.")
          PY

      # 2) Save image as TAR file
      - name: Export Docker Image as TAR
        run: |
          docker save comfyui-rocm:latest -o comfyui-rocm.tar
          ls -lh comfyui-rocm.tar

      # 3) Original TAR hashes before compression
      - name: Hash original comfyui-rocm.tar
        run: |
          sha256sum comfyui-rocm.tar > comfyui-rocm.tar.sha256
          md5sum comfyui-rocm.tar > comfyui-rocm.tar.md5

      # 4) Compress TAR directly with zstd
      # Important: this does NOT tar the tar again.
      # It compresses comfyui-rocm.tar into comfyui-rocm.tar.zst directly.
      - name: Compress with zstd
        run: |
          zstd -T0 -19 -f comfyui-rocm.tar -o comfyui-rocm.tar.zst
          ls -lh comfyui-rocm.tar.zst

      # 5) Hash compressed file
      - name: Hash compressed comfyui-rocm.tar.zst
        run: |
          sha256sum comfyui-rocm.tar.zst > comfyui-rocm.tar.zst.sha256
          md5sum comfyui-rocm.tar.zst > comfyui-rocm.tar.zst.md5

      # 6) Split compressed file into parts:
      # comfyui-rocm.part01.zst
      # comfyui-rocm.part02.zst
      # ...
      - name: Split compressed archive
        run: |
          split \
            -b 1900M \
            -d \
            -a 2 \
            --numeric-suffixes=1 \
            --additional-suffix=.zst \
            comfyui-rocm.tar.zst \
            comfyui-rocm.part

          ls -lh comfyui-rocm.part*.zst

      # 7) Hash each split part
      - name: Hash split parts
        run: |
          sha256sum comfyui-rocm.part*.zst > comfyui-rocm.parts.sha256
          md5sum comfyui-rocm.part*.zst > comfyui-rocm.parts.md5

      # 9) Create GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: comfyui-rocm-${{ github.run_id }}
          name: ComfyUI ROCm ${{ github.run_id }}
          body_path: release-body.md
          files: |
            comfyui-rocm.part*.zst
            comfyui-rocm.tar.sha256
            comfyui-rocm.tar.md5
            comfyui-rocm.tar.zst.sha256
            comfyui-rocm.tar.zst.md5
            comfyui-rocm.parts.sha256
            comfyui-rocm.parts.md5

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 10) Print Release URL
      - name: Print Release URL
        run: |
          echo "Release ready:"
          echo "https://github.com/${{ github.repository }}/releases/tag/comfyui-rocm-${{ github.run_id }}"
