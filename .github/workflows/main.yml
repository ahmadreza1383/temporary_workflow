name: Build and Release Large File

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y xz-utils coreutils pv

      - name: Set variables
        run: |
          echo "FILE=output.file" >> $GITHUB_ENV

      - name: Check file
        run: |
          if [ ! -f "$FILE" ]; then
            echo "File not found: $FILE"
            exit 1
          fi
          ls -lh "$FILE"

      - name: Hash original file
        run: |
          sha256sum "$FILE" > original.sha256
          md5sum "$FILE" > original.md5
          echo "Original file hashes:"
          cat original.sha256
          cat original.md5

      - name: Compress with xz
        run: |
          tar -I 'xz -T0 -9' -cf build.tar.xz "$FILE"

      - name: Hash compressed archive
        run: |
          sha256sum build.tar.xz > build.tar.xz.sha256
          md5sum build.tar.xz > build.tar.xz.md5
          ls -lh build.tar.xz

      - name: Split archive if larger than 2GB
        run: |
          SIZE=$(stat -c%s build.tar.xz)
          LIMIT=$((2 * 1024 * 1024 * 1024))

          if [ "$SIZE" -gt "$LIMIT" ]; then
            echo "Splitting archive..."
            split -b 1900M build.tar.xz build.part.
          else
            echo "Archive smaller than 2GB, no split needed"
            cp build.tar.xz build.part.00
          fi

      - name: Hash split parts
        run: |
          sha256sum build.part.* > parts.sha256
          md5sum build.part.* > parts.md5
          cat parts.sha256
          cat parts.md5

      - name: Create Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_id }}
          name: Build ${{ github.run_id }}
          body: |
            Automated build

            -----------------------
            Original File SHA256
            -----------------------
            $(cat original.sha256)

            -----------------------
            Original File MD5
            -----------------------
            $(cat original.md5)

            -----------------------
            Compressed Archive SHA256
            -----------------------
            $(cat build.tar.xz.sha256)

            -----------------------
            Compressed Archive MD5
            -----------------------
            $(cat build.tar.xz.md5)

            Hashes for split parts are included as files.
          files: |
            build.part.*
            original.sha256
            original.md5
            build.tar.xz.sha256
            build.tar.xz.md5
            parts.sha256
            parts.md5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print Release URL
        run: |
          echo "Release URL:"
          echo "https://github.com/${{ github.repository }}/releases/tag/build-${{ github.run_id }}"
